<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>พีทาโกรัส Interactive</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- MathJax for LaTeX -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Kanit', sans-serif;
      background: #f5f9ff;
      color: #1a2a4a;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      color: #1e3a8a;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-top: 20px;
    }

    input {
      width: 80px;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      text-align: center;
      font-size: 16px;
    }

    canvas {
      margin-top: 20px;
      background: #eef4ff;
      border-radius: 15px;
    }

    .formula {
      font-size: 22px;
      margin-top: 10px;
      color: #1e40af;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>📐 ทฤษฎีบทพีทาโกรัส</h1>

    <div class="card">
      <p>ลองปรับค่า a และ b แล้วดูว่า c เปลี่ยนยังไง 👇</p>

      <div>
        a = <input type="number" id="a" value="3" step="0.1">
        b = <input type="number" id="b" value="4" step="0.1">
      </div>

      <div class="formula">
        \( a^2 + b^2 = c^2 \)
      </div>

      <p>ค่า c = <span id="cValue">5</span></p>

      <canvas id="canvas" width="400" height="400"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const aInput = document.getElementById('a');
    const bInput = document.getElementById('b');
    const cValue = document.getElementById('cValue');

    function draw() {
      const a = parseFloat(aInput.value);
      const b = parseFloat(bInput.value);
      const c = Math.sqrt(a*a + b*b);

      cValue.innerText = c.toFixed(2);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const scale = 30;

      const x0 = 50;
      const y0 = 300;

      const ax = x0 + a * scale;
      const by = y0 - b * scale;

      // triangle
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(ax, y0);
      ctx.lineTo(x0, by);
      ctx.closePath();
      ctx.strokeStyle = '#1e40af';
      ctx.lineWidth = 3;
      ctx.stroke();

      // labels
      ctx.fillStyle = '#000';
      ctx.fillText('a', (x0+ax)/2, y0 + 20);
      ctx.fillText('b', x0 - 20, (y0+by)/2);
      ctx.fillText('c', (x0+ax)/2, (y0+by)/2);
    }

    aInput.addEventListener('input', draw);
    bInput.addEventListener('input', draw);

    draw();
  </script>

</body>
</html>
